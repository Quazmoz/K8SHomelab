---
# Hermes Agent Credentials Secret (SOPS-encrypted stub)
#
# This file MUST be encrypted with SOPS before committing.
# Use: .\scripts\sops-edit.ps1 apps\base\hermes-agent\hermes-agent-credentials.secret.enc.yaml
#
# Only ONE new key is introduced here (API_SERVER_KEY).
# All LLM provider keys continue to live in `openclaw-credentials`
# and are referenced directly from both deployments — zero duplication.
#
# To generate a secure API_SERVER_KEY:
#   openssl rand -hex 32
#
# After editing, encrypt:
#   sops --encrypt --in-place apps\base\hermes-agent\hermes-agent-credentials.secret.enc.yaml
apiVersion: v1
kind: Secret
metadata:
  name: hermes-agent-credentials
  namespace: apps
  labels:
    app: hermes-agent
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: credentials
type: Opaque
stringData:
  # Bearer token for the Hermes :8642 OpenAI-compatible API server.
  # Clients must send: Authorization: Bearer <API_SERVER_KEY>
  API_SERVER_KEY: "REPLACE_WITH_SOPS_ENCRYPTED_VALUE"
