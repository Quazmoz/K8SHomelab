---
# OpenClaw Service
# Gateway (WebSocket + Canvas HTTP) via socat sidecar on 18790
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: apps
  labels:
    app: openclaw
    app.kubernetes.io/name: openclaw
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
  - name: gateway
    port: 18789
    targetPort: 18790
    protocol: TCP
