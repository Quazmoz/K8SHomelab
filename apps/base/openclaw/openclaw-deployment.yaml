---
# OpenClaw Deployment - Autonomous AI Agent
# Runs on Orange Pi 6 Plus (ARM64 control plane)
# Gateway port: 18789, Canvas HTTP: 18793
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: apps
  labels:
    app: openclaw
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: ai-agent
    app.kubernetes.io/part-of: ai-stack
  annotations:
    description: "OpenClaw autonomous AI agent with secure containerized runtime"
    docs: "https://openclaw.ai/docs"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate  # Single replica, preserve state
  template:
    metadata:
      labels:
        app: openclaw
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/component: ai-agent
    spec:
      # Run on Orange Pi 6 Plus (ARM64 control plane)
      nodeSelector:
        kubernetes.io/hostname: orangepi6plus
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      # initContainers run to completion before main containers start.
      # Used here to seed skills, prune heavyweight bootstrap files, and
      # normalize agent models from repo-managed templates.
      initContainers:
      - name: bootstrap-openclaw
        image: python:3.11-alpine
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        env:
        - name: OPENCLAW_SKILL_ALLOWLIST
          value: "n8n,n8n-editor,k8s-admin,postgres-admin,prometheus-monitoring,helm-management,image-management,network-diagnostics,log-analysis-alerting,gitops-delivery,backup-dr,service-mesh,terminal,shell,filesystem,git,web-search,http,memory"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENAI_API_KEY
              optional: false
        - name: CHATGPT_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: CHATGPT_API_KEY
              optional: true
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: MISTRAL_API_KEY
              optional: true
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENROUTER_API_KEY
              optional: true
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: GEMINI_API_KEY
              optional: true
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: GEMINI_API_KEY
              optional: true
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: GROQ_API_KEY
              optional: true
        - name: HUGGINGFACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: HUGGINGFACE_HUB_TOKEN
              optional: true
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: HUGGINGFACE_HUB_TOKEN
              optional: true
        - name: CEREBRAS_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: CEREBRAS_API_KEY
              optional: true
        command:
        - python3
        - /opt/bootstrap/bootstrap_openclaw.py
        volumeMounts:
        - name: openclaw-data
          mountPath: /home/user/.openclaw
        - name: openclaw-bootstrap
          mountPath: /opt/bootstrap
          readOnly: true
        - name: n8n-skill
          mountPath: /opt/bootstrap/skills/n8n
          readOnly: true
        - name: n8n-editor-skill
          mountPath: /opt/bootstrap/skills/n8n-editor
          readOnly: true
        - name: k8s-admin-skill
          mountPath: /opt/bootstrap/skills/k8s-admin
          readOnly: true
        - name: postgres-admin-skill
          mountPath: /opt/bootstrap/skills/postgres-admin
          readOnly: true
        - name: prometheus-monitoring-skill
          mountPath: /opt/bootstrap/skills/prometheus-monitoring
          readOnly: true
        - name: helm-management-skill
          mountPath: /opt/bootstrap/skills/helm-management
          readOnly: true
        - name: image-management-skill
          mountPath: /opt/bootstrap/skills/image-management
          readOnly: true
        - name: network-diagnostics-skill
          mountPath: /opt/bootstrap/skills/network-diagnostics
          readOnly: true
        - name: log-analysis-alerting-skill
          mountPath: /opt/bootstrap/skills/log-analysis-alerting
          readOnly: true
        - name: gitops-delivery-skill
          mountPath: /opt/bootstrap/skills/gitops-delivery
          readOnly: true
        - name: backup-dr-skill
          mountPath: /opt/bootstrap/skills/backup-dr
          readOnly: true
        - name: service-mesh-skill
          mountPath: /opt/bootstrap/skills/service-mesh
          readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:2026.4.26-arm64
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 18789
          name: gateway
        env:
        # Align HOME with OPENCLAW_STATE_DIR so memory workspace
        # (~/.openclaw/workspace) lives on the PVC, not ephemeral storage.
        - name: HOME
          value: "/home/user"
        # OpenClaw binds strictly to 127.0.0.1 for security.
        - name: OPENCLAW_GATEWAY_BIND
          value: "loopback"
        # State directory inside the container
        - name: OPENCLAW_STATE_DIR
          value: "/home/user/.openclaw"
        # Restrict skill discovery to curated PVC-backed skills only.
        - name: OPENCLAW_BUNDLED_PLUGINS_DIR
          value: "/home/user/.openclaw/skills"
        # Ollama Cloud backend exposed through OpenAI-compatible routing.
        # This is not a real OpenAI key despite the env var name.
        - name: OPENAI_BASE_URL
          value: "https://ollama.com/v1"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENAI_API_KEY
              optional: false
        # Native Ollama provider auth (reuse the same key as OPENAI-compatible mode)
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENAI_API_KEY
              optional: false
        # Fallback: OpenRouter (used when Ollama Cloud limits are hit)
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENROUTER_API_KEY
              optional: true
        # Free/freemium bundled providers.
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: GEMINI_API_KEY
              optional: true
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: GEMINI_API_KEY
              optional: true
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: GROQ_API_KEY
              optional: true
        - name: HUGGINGFACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: HUGGINGFACE_HUB_TOKEN
              optional: true
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: HUGGINGFACE_HUB_TOKEN
              optional: true
        - name: CEREBRAS_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: CEREBRAS_API_KEY
              optional: true
        # Optional additional backends.
        - name: CHATGPT_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: CHATGPT_API_KEY
              optional: true
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: MISTRAL_API_KEY
              optional: true
        # n8n skill: internal service URL and API key
        - name: N8N_BASE_URL
          value: "http://n8n.apps.svc.cluster.local:5678"
        - name: N8N_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: N8N_API_KEY
              optional: true
        # Optional: additional provider keys
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: ANTHROPIC_API_KEY
              optional: true
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: GATEWAY_TOKEN
              optional: false
        volumeMounts:
        - name: openclaw-data
          mountPath: /home/user/.openclaw
        resources:
          requests:
            memory: "1Gi"
            cpu: "200m"
          limits:
            memory: "6Gi"
            cpu: "2000m"
        # Newer OpenClaw versions can take longer to bind the gateway socket.
        # Gate liveness/readiness behind startupProbe to avoid crash loops.
        startupProbe:
          exec:
            command:
            - sh
            - -c
            - "code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18789 || echo 000); [ \"$code\" = \"200\" ] || [ \"$code\" = \"401\" ]"
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 120
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18789 || echo 000); [ \"$code\" = \"200\" ] || [ \"$code\" = \"401\" ]"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18789 || echo 000); [ \"$code\" = \"200\" ] || [ \"$code\" = \"401\" ]"
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      # Sidecar proxy to expose 127.0.0.1 to 0.0.0.0 for k8s networking
      - name: openclaw-proxy
        image: alpine/socat:latest
        command:
        - socat
        - TCP-LISTEN:18790,fork,bind=0.0.0.0
        - TCP-CONNECT:127.0.0.1:18789
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
      volumes:
      - name: openclaw-data
        persistentVolumeClaim:
          claimName: openclaw-data-pvc
      - name: n8n-skill
        configMap:
          name: openclaw-n8n-skill
      - name: n8n-editor-skill
        configMap:
          name: openclaw-n8n-editor-skill
      - name: k8s-admin-skill
        configMap:
          name: openclaw-k8s-admin-skill
      - name: postgres-admin-skill
        configMap:
          name: openclaw-postgres-admin-skill
      - name: prometheus-monitoring-skill
        configMap:
          name: openclaw-prometheus-monitoring-skill
      - name: helm-management-skill
        configMap:
          name: openclaw-helm-management-skill
      - name: image-management-skill
        configMap:
          name: openclaw-image-management-skill
      - name: network-diagnostics-skill
        configMap:
          name: openclaw-network-diagnostics-skill
      - name: log-analysis-alerting-skill
        configMap:
          name: openclaw-log-analysis-alerting-skill
      - name: gitops-delivery-skill
        configMap:
          name: openclaw-gitops-delivery-skill
      - name: backup-dr-skill
        configMap:
          name: openclaw-backup-dr-skill
      - name: service-mesh-skill
        configMap:
          name: openclaw-service-mesh-skill
      - name: openclaw-bootstrap
        configMap:
          name: openclaw-bootstrap

