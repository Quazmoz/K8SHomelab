---
# OpenClaw Deployment - Autonomous AI Agent
# Runs on Orange Pi 6 Plus (ARM64 control plane)
# Gateway port: 18789, Canvas HTTP: 18793
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: apps
  labels:
    app: openclaw
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: ai-agent
    app.kubernetes.io/part-of: ai-stack
  annotations:
    description: "OpenClaw autonomous AI agent with secure containerized runtime"
    docs: "https://openclaw.ai/docs"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate  # Single replica, preserve state
  template:
    metadata:
      labels:
        app: openclaw
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/component: ai-agent
    spec:
      # Run on Orange Pi 6 Plus (ARM64 control plane)
      nodeSelector:
        kubernetes.io/hostname: orangepi6plus
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 18789
          name: gateway
        env:
        # OpenClaw binds strictly to 127.0.0.1 for security.
        - name: OPENCLAW_GATEWAY_BIND
          value: "loopback"
        # State directory inside the container
        - name: OPENCLAW_STATE_DIR
          value: "/home/user/.openclaw"
        # Ollama Cloud backend — OpenAI-compatible endpoint
        - name: OPENAI_BASE_URL
          value: "https://api.ollama.com/v1"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENAI_API_KEY
              optional: false
        # Native Ollama provider auth (reuse the same key as OPENAI-compatible mode)
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENAI_API_KEY
              optional: false
        # Fallback: OpenRouter (used when Ollama Cloud limits are hit)
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENROUTER_API_KEY
              optional: true
        # Optional: additional provider keys
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: ANTHROPIC_API_KEY
              optional: true
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: GATEWAY_TOKEN
              optional: false
        volumeMounts:
        - name: openclaw-data
          mountPath: /home/user/.openclaw
        resources:
          requests:
            memory: "1Gi"
            cpu: "200m"
          limits:
            memory: "6Gi"
            cpu: "2000m"
        # Probes check 127.0.0.1 directly inside the pod
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "nc -z 127.0.0.1 18789 || curl -s http://127.0.0.1:18789"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "nc -z 127.0.0.1 18789 || curl -s http://127.0.0.1:18789"
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      # Sidecar proxy to expose 127.0.0.1 to 0.0.0.0 for k8s networking
      - name: openclaw-proxy
        image: alpine/socat:latest
        command:
        - socat
        - TCP-LISTEN:18790,fork,bind=0.0.0.0
        - TCP-CONNECT:127.0.0.1:18789
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
      volumes:
      - name: openclaw-data
        persistentVolumeClaim:
          claimName: openclaw-data-pvc
