apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-ingress
  namespace: apps
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Map ?token= query param to Authorization Bearer header at server level
    nginx.ingress.kubernetes.io/server-snippet: |
      set $oc_auth "";
      if ($arg_token != "") {
        set $oc_auth "Bearer $arg_token";
      }
      # Clear Bearer header for WS path (gateway accepts ?token= natively for WS)
      if ($uri ~ "^/__openclaw__/ws$") {
        set $oc_auth "";
      }
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Authorization $oc_auth;
      # Rewrite /__openclaw__/ws to / for the WebSocket gateway endpoint
      rewrite ^/__openclaw__/ws$ /?token=$arg_token break;
      # Override upstream CSP to allow the inline theme-init script
      proxy_hide_header Content-Security-Policy;
      add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'sha256-RxCZFmTWY/yQmhYxMDn+blaCuwLzOsV/XsVb0n5EkRU='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: wss:" always;
spec:
  ingressClassName: nginx
  rules:
  - host: openclaw.k8s.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openclaw
            port:
              number: 18789
