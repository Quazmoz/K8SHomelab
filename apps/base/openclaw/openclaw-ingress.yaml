apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-ingress
  namespace: apps
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Map ?token= query param to Authorization Bearer header at server level
    nginx.ingress.kubernetes.io/server-snippet: |
      set $oc_auth "";
      if ($arg_token != "") {
        set $oc_auth "Bearer $arg_token";
      }
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Authorization $oc_auth;
      # Rewrite /__openclaw__/ws to / for the WebSocket gateway endpoint
      rewrite ^/__openclaw__/ws$ / break;
spec:
  ingressClassName: nginx
  rules:
  - host: openclaw.k8s.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openclaw
            port:
              number: 18789
