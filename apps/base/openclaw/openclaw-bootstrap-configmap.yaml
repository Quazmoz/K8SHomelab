apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-bootstrap
  namespace: apps
  labels:
    app: openclaw
data:
  bootstrap_openclaw.py: |
    import json
    import os
    import shutil
    from pathlib import Path


    ROOT = Path("/home/user/.openclaw")
    TEMPLATE_DIR = Path("/opt/bootstrap")
    SKILLS_SRC = TEMPLATE_DIR / "skills"
    LEAN_MAIN_AGENTS = TEMPLATE_DIR / "main-AGENTS.md"
    N8N_CONTROL_AGENTS = TEMPLATE_DIR / "n8n-control-AGENTS.md"
    CONFIG_PATH = ROOT / "openclaw.json"
    SKILL_ALLOWLIST = {
        name.strip().lower()
        for name in os.environ.get(
            "OPENCLAW_SKILL_ALLOWLIST",
            "n8n,n8n-editor,terminal,shell,filesystem,git,web-search,http,memory",
        ).split(",")
        if name.strip()
    }

    AGENT_MODELS = {
        "main": "openai/kimi-k2.5",
        "research": "openai/kimi-k2.5",
        "homelab": "openai/kimi-k2.5",
        "n8n-control": "openai/kimi-k2.5",
        "ops": "openai/nemotron-3-super",
    }

    AGENT_WORKSPACES = {
        "main": "workspace",
        "ops": "workspace-ops",
        "research": "workspace-research",
        "homelab": "workspace-homelab",
        "n8n-control": "workspace-n8n",
    }

    AGENT_IDENTITIES = {
        "ops": "Ops",
        "research": "Research",
        "homelab": "Homelab",
        "n8n-control": "n8n Control",
    }

    PROVIDER_CONFIGS = {
        "chatgpt": {
            "baseUrl": "https://api.openai.com/v1",
            "api": "openai-completions",
            "apiKey": "env:CHATGPT_API_KEY",
            "models": [],
        },
        "mistral": {
            "baseUrl": "https://api.mistral.ai/v1",
            "api": "openai-completions",
            "apiKey": "env:MISTRAL_API_KEY",
            "models": [],
        },
    }

    DEFAULT_MODELS = {
        "openai/kimi-k2.5": {},
        "openai/nemotron-3-super": {},
        "chatgpt/gpt-4.1-mini": {},
        "chatgpt/gpt-4.1": {},
        "chatgpt/gpt-4o-mini": {},
        "mistral/ministral-14b-2512": {},
        "mistral/codestral-2508": {},
        "mistral/mistral-medium-2508": {},
        "mistral/devstral-2512": {},
    }

    TOKEN_TUNED_DEFAULTS = {
        "maxConcurrent": 2,
        "subagents": {"maxConcurrent": 3},
        "thinkingDefault": "minimal",
    }

    N8N_CONTROL_TUNING = {
        "subagents": {"maxConcurrent": 1},
        "thinkingDefault": "minimal",
    }


    def copy_tree(src: Path, dst: Path) -> None:
        if not src.exists():
            return
        dst.mkdir(parents=True, exist_ok=True)
        for item in src.iterdir():
            target = dst / item.name
            if item.is_dir():
                copy_tree(item, target)
            else:
                shutil.copy2(item, target)


    def install_skills() -> None:
        skills_dst = ROOT / "skills"
        # Reset managed skills so stale skill dirs do not persist forever on PVC.
        if skills_dst.exists():
            for existing in skills_dst.iterdir():
                if existing.is_dir() and existing.name != "memory":
                    shutil.rmtree(existing)
        skills_dst.mkdir(parents=True, exist_ok=True)

        def is_allowed_skill(skill_name: str) -> bool:
            return skill_name.lower() in SKILL_ALLOWLIST

        for skill_dir in SKILLS_SRC.iterdir():
            if skill_dir.is_dir() and is_allowed_skill(skill_dir.name):
                copy_tree(skill_dir, skills_dst / skill_dir.name)


    def ensure_agent_state() -> None:
        agents_root = ROOT / "agents"
        agents_root.mkdir(parents=True, exist_ok=True)
        for agent_id, workspace_name in AGENT_WORKSPACES.items():
            (ROOT / workspace_name).mkdir(parents=True, exist_ok=True)
            (agents_root / agent_id / "agent").mkdir(parents=True, exist_ok=True)
            (agents_root / agent_id / "sessions").mkdir(parents=True, exist_ok=True)


    def prune_workspace_noise() -> None:
        workspaces = [ROOT / "workspace"]
        workspaces.extend(path for path in ROOT.iterdir() if path.name.startswith("workspace-"))

        for workspace in workspaces:
            for noisy_name in ("BOOTSTRAP.md", "HEARTBEAT.md"):
                noisy_file = workspace / noisy_name
                if noisy_file.exists():
                    noisy_file.unlink()

        main_agents_path = ROOT / "workspace" / "AGENTS.md"
        if main_agents_path.exists():
            backup = main_agents_path.with_suffix(".md.pre-bootstrap.bak")
            if not backup.exists():
                shutil.copy2(main_agents_path, backup)
        shutil.copy2(LEAN_MAIN_AGENTS, main_agents_path)

        n8n_agents_path = ROOT / "workspace-n8n" / "AGENTS.md"
        shutil.copy2(N8N_CONTROL_AGENTS, n8n_agents_path)


    def patch_config() -> None:
        if not CONFIG_PATH.exists():
            return

        data = json.loads(CONFIG_PATH.read_text(encoding="utf-8"))
        model_config = data.setdefault("models", {})
        providers = model_config.setdefault("providers", {})
        for provider_id, provider_config in PROVIDER_CONFIGS.items():
            providers[provider_id] = provider_config

        agents = data.setdefault("agents", {})
        defaults = agents.setdefault("defaults", {})
        defaults["model"] = {"primary": AGENT_MODELS["main"]}
        defaults["workspace"] = "/home/user/.openclaw/workspace"
        # Replace the model catalog to prevent stale model sprawl/token overhead.
        defaults["models"] = DEFAULT_MODELS.copy()
        for key, value in TOKEN_TUNED_DEFAULTS.items():
            defaults[key] = value

        agent_list = agents.setdefault("list", [])
        by_id = {
            entry.get("id"): entry
            for entry in agent_list
            if isinstance(entry, dict) and entry.get("id")
        }

        for agent_id in ("main", "ops", "research", "homelab", "n8n-control"):
            agent = by_id.get(agent_id)
            if agent is None:
                agent = {"id": agent_id}
                agent_list.append(agent)
                by_id[agent_id] = agent

            workspace_name = AGENT_WORKSPACES[agent_id]
            agent["workspace"] = f"/home/user/.openclaw/{workspace_name}"
            agent["agentDir"] = f"/home/user/.openclaw/agents/{agent_id}/agent"
            agent["model"] = AGENT_MODELS[agent_id]

            if agent_id != "main":
                agent.setdefault("name", agent_id)
                identity = agent.setdefault("identity", {})
                identity.setdefault("name", AGENT_IDENTITIES.get(agent_id, agent_id.capitalize()))

            if agent_id == "n8n-control":
                for key, value in N8N_CONTROL_TUNING.items():
                    agent[key] = value

        CONFIG_PATH.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")


    def main() -> None:
        install_skills()
        ensure_agent_state()
        prune_workspace_noise()
        patch_config()
        print("OpenClaw bootstrap complete")


    if __name__ == "__main__":
        main()
  main-AGENTS.md: |
    # AGENTS.md - Main Workspace

    This workspace is for direct conversations in Control UI.

    ## Session Startup

    Read these first:

    1. `SOUL.md`
    2. `USER.md`
    3. `memory/YYYY-MM-DD.md` for today, then yesterday if needed

    Only open `MEMORY.md` when the user asks for long-term context, personal history,
    resume/profile material, or older decisions that are not in the daily notes.

    ## Working Rules

    - Prefer action over ceremony.
    - Do not claim success without evidence.
    - Keep external side effects explicit.
    - Keep this workspace lean; archive bulky notes instead of loading them every chat.
    - For simple data fetch requests (for example listing n8n workflows), run one direct query path, retry at most once on transport/auth failure, then return results or a concrete error.

    ## Bootstrap Hygiene

    - `BOOTSTRAP.md` should not exist after initial setup.
    - `HEARTBEAT.md` should stay absent unless periodic checks are intentionally configured.
    n8n-control-AGENTS.md: |
        # AGENTS.md - n8n Control Workspace

        This workspace is dedicated to n8n operations only.

        ## Scope

        Allowed work:

        - list workflows
        - find workflows by name/tag/content (for example GroupMe)
        - inspect workflow JSON
        - trigger manual runs
        - inspect execution status/errors
        - apply n8n workflow updates via the `n8n-editor` helper

        Out of scope in this workspace:

        - general coding tasks
        - Kubernetes troubleshooting unrelated to n8n workflow operations
        - broad research tasks

        ## Execution Rules

        - Prefer one direct helper path for list/filter queries:
            `python3 /home/user/.openclaw/skills/n8n/n8n_query_helper.py workflows --match <text> --limit 50`
        - Retry at most once on auth/transport errors.
        - Do not spawn subagents for simple read-only n8n queries.
        - If both attempts fail, stop and return a concise error containing the exact HTTP/transport failure.
        - Never claim workflow edits succeeded unless the helper returns success.

        ## Output Format

        - For list/filter: return count plus compact items (`id`, `name`, `active`, `updatedAt`).
        - For execution failures: include `executionId`, failed node name, and error message when available.