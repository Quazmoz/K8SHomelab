apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-bootstrap
  namespace: apps
  labels:
    app: openclaw
data:
  bootstrap_openclaw.py: |
    import json
    import os
    import shutil
    from pathlib import Path


    ROOT = Path("/home/user/.openclaw")
    TEMPLATE_DIR = Path("/opt/bootstrap")
    SKILLS_SRC = TEMPLATE_DIR / "skills"
    LEAN_MAIN_AGENTS = TEMPLATE_DIR / "main-AGENTS.md"
    N8N_CONTROL_AGENTS = TEMPLATE_DIR / "n8n-control-AGENTS.md"
    CONFIG_PATH = ROOT / "openclaw.json"
    SKILL_ALLOWLIST = {
        name.strip().lower()
        for name in os.environ.get(
            "OPENCLAW_SKILL_ALLOWLIST",
            "n8n,n8n-editor,k8s-admin,postgres-admin,prometheus-monitoring,helm-management,image-management,network-diagnostics,log-analysis-alerting,gitops-delivery,backup-dr,service-mesh,terminal,shell,filesystem,git,web-search,http,memory",
        ).split(",")
        if name.strip()
    }

    AGENT_MODELS = {
        "main": "openai/kimi-k2.5",
        "research": "openai/kimi-k2.5",
        "homelab": "openai/kimi-k2.5",
        "n8n-control": "openai/kimi-k2.5",
        "ops": "openai/nemotron-3-super",
    }

    AGENT_WORKSPACES = {
        "main": "workspace",
        "ops": "workspace-ops",
        "research": "workspace-research",
        "homelab": "workspace-homelab",
        "n8n-control": "workspace-n8n",
    }

    AGENT_IDENTITIES = {
        "ops": "Ops",
        "research": "Research",
        "homelab": "Homelab",
        "n8n-control": "n8n Control",
    }

    PROVIDER_CONFIGS = {
        "openai": {
            "baseUrl": "https://ollama.com/v1",
            "api": "openai-completions",
            "apiKey": "env:OPENAI_API_KEY",
            "models": [],
        },
        "chatgpt": {
            "baseUrl": "https://api.openai.com/v1",
            "api": "openai-completions",
            "apiKey": "env:CHATGPT_API_KEY",
            "models": [],
        },
        "mistral": {
            "baseUrl": "https://api.mistral.ai/v1",
            "api": "openai-completions",
            "apiKey": "env:MISTRAL_API_KEY",
            "models": [],
        },
    }

    BUNDLED_PROVIDER_ENV_VARS = {
        "openrouter": ("OPENROUTER_API_KEY",),
        "google": ("GEMINI_API_KEY", "GOOGLE_API_KEY"),
        "groq": ("GROQ_API_KEY",),
        "huggingface": ("HUGGINGFACE_HUB_TOKEN", "HF_TOKEN"),
        "cerebras": ("CEREBRAS_API_KEY",),
    }

    BUNDLED_PROVIDER_AUTH_ENV = {
        "openrouter": "OPENROUTER_API_KEY",
        "google": "GEMINI_API_KEY",
        "groq": "GROQ_API_KEY",
        "huggingface": "HUGGINGFACE_HUB_TOKEN",
        "cerebras": "CEREBRAS_API_KEY",
    }

    DEFAULT_MODELS = {
        "openai/kimi-k2.5": {},
        "openai/nemotron-3-super": {},
        "chatgpt/gpt-4.1-mini": {},
        "chatgpt/gpt-4.1": {},
        "chatgpt/gpt-4o-mini": {},
        "mistral/ministral-14b-2512": {},
        "mistral/codestral-2508": {},
        "mistral/mistral-medium-2508": {},
        "mistral/devstral-2512": {},
        "openrouter/free": {},
        "google/gemini-2.5-flash-lite": {},
        "google/gemini-2.5-flash": {},
        "google/gemini-2.5-pro": {},
        "groq/llama-3.1-8b-instant": {},
        "groq/llama-3.3-70b-versatile": {},
        "huggingface/Qwen/Qwen3-8B:cheapest": {},
        "huggingface/deepseek-ai/DeepSeek-R1:fastest": {},
    }

    TOKEN_TUNED_DEFAULTS = {
        "maxConcurrent": 2,
        "subagents": {},
    }

    CORE_AGENT_SKILLS = ["n8n", "n8n-editor"]
    HOMELAB_AGENT_SKILLS = [
        "n8n",
        "n8n-editor",
        "k8s-admin",
        "postgres-admin",
        "prometheus-monitoring",
        "helm-management",
        "image-management",
        "network-diagnostics",
        "log-analysis-alerting",
        "gitops-delivery",
        "backup-dr",
        "service-mesh",
    ]

    N8N_CONTROL_TUNING = {}


    def resolve_api_key_spec(api_key_spec: str | None) -> str | None:
        if not isinstance(api_key_spec, str):
            return api_key_spec

        candidate = api_key_spec.strip()
        if not candidate:
            return None

        env_name = None
        if candidate.startswith("env:"):
            env_name = candidate.split(":", 1)[1].strip()
        elif candidate.isupper() and "_" in candidate:
            env_name = candidate

        if env_name:
            resolved = os.environ.get(env_name, "").strip()
            return resolved or None

        return candidate


    def resolve_provider_config(provider_config: dict) -> dict | None:
        resolved = dict(provider_config)
        api_key = resolve_api_key_spec(resolved.get("apiKey"))

        if api_key is None and "apiKey" in resolved:
            return None

        if api_key is not None:
            resolved["apiKey"] = api_key

        return resolved


    def build_runtime_provider_configs() -> dict:
        runtime_provider_configs = {}
        for provider_id, provider_config in PROVIDER_CONFIGS.items():
            resolved = resolve_provider_config(provider_config)
            if resolved is not None:
                runtime_provider_configs[provider_id] = resolved
        return runtime_provider_configs


    def normalize_provider_map(provider_map: dict) -> dict:
        normalized = {}
        for provider_id, provider_config in provider_map.items():
            if not isinstance(provider_config, dict):
                normalized[provider_id] = provider_config
                continue

            resolved = resolve_provider_config(provider_config)
            if resolved is not None:
                normalized[provider_id] = resolved

        return normalized


    def build_default_models(active_provider_ids: set[str]) -> dict:
        return {
            model_id: model_config
            for model_id, model_config in DEFAULT_MODELS.items()
            if model_id.split("/", 1)[0] in active_provider_ids
        }


    def detect_active_provider_ids(runtime_provider_configs: dict) -> set[str]:
        active_provider_ids = set(runtime_provider_configs)
        for provider_id, env_names in BUNDLED_PROVIDER_ENV_VARS.items():
            if any(os.environ.get(env_name, "").strip() for env_name in env_names):
                active_provider_ids.add(provider_id)
        return active_provider_ids


    def copy_tree(src: Path, dst: Path) -> None:
        if not src.exists():
            return
        dst.mkdir(parents=True, exist_ok=True)
        for item in src.iterdir():
            target = dst / item.name
            if item.is_dir():
                copy_tree(item, target)
            else:
                shutil.copy2(item, target)


    def install_skills() -> None:
        skills_dst = ROOT / "skills"
        # Reset managed skills so stale skill dirs do not persist forever on PVC.
        if skills_dst.exists():
            for existing in skills_dst.iterdir():
                if existing.is_dir() and existing.name != "memory":
                    shutil.rmtree(existing)
        skills_dst.mkdir(parents=True, exist_ok=True)

        def is_allowed_skill(skill_name: str) -> bool:
            return skill_name.lower() in SKILL_ALLOWLIST

        for skill_dir in SKILLS_SRC.iterdir():
            if skill_dir.is_dir() and is_allowed_skill(skill_dir.name):
                copy_tree(skill_dir, skills_dst / skill_dir.name)


    def ensure_agent_state() -> None:
        agents_root = ROOT / "agents"
        agents_root.mkdir(parents=True, exist_ok=True)
        for agent_id, workspace_name in AGENT_WORKSPACES.items():
            (ROOT / workspace_name).mkdir(parents=True, exist_ok=True)
            (agents_root / agent_id / "agent").mkdir(parents=True, exist_ok=True)
            (agents_root / agent_id / "sessions").mkdir(parents=True, exist_ok=True)


    def prune_workspace_noise() -> None:
        workspaces = [ROOT / "workspace"]
        workspaces.extend(path for path in ROOT.iterdir() if path.name.startswith("workspace-"))

        for workspace in workspaces:
            for noisy_name in ("BOOTSTRAP.md", "HEARTBEAT.md"):
                noisy_file = workspace / noisy_name
                if noisy_file.exists():
                    noisy_file.unlink()

        main_agents_path = ROOT / "workspace" / "AGENTS.md"
        if main_agents_path.exists():
            backup = main_agents_path.with_suffix(".md.pre-bootstrap.bak")
            if not backup.exists():
                shutil.copy2(main_agents_path, backup)
        shutil.copy2(LEAN_MAIN_AGENTS, main_agents_path)

        n8n_agents_path = ROOT / "workspace-n8n" / "AGENTS.md"
        shutil.copy2(N8N_CONTROL_AGENTS, n8n_agents_path)


    def patch_config() -> None:
        if not CONFIG_PATH.exists():
            return

        data = json.loads(CONFIG_PATH.read_text(encoding="utf-8"))
        commands = data.setdefault("commands", {})
        # Prevent accidental in-app restart requests from flapping the pod.
        commands["restart"] = False
        # Disable bundled/native capabilities and keep only curated PVC skills.
        commands["native"] = False
        commands["nativeSkills"] = False
        # Drop stale plugin state from previous versions to avoid warning churn.
        data.pop("plugins", None)

        model_config = data.setdefault("models", {})
        providers = normalize_provider_map(model_config.setdefault("providers", {}))
        runtime_provider_configs = build_runtime_provider_configs()
        active_provider_ids = detect_active_provider_ids(runtime_provider_configs)
        # Remove legacy ollama provider (duplicate of openai; wrong URL persisted on PVC).
        providers.pop("ollama", None)
        for provider_id in PROVIDER_CONFIGS:
            providers.pop(provider_id, None)
        for provider_id, provider_config in runtime_provider_configs.items():
            providers[provider_id] = provider_config
        model_config["providers"] = providers

        agents = data.setdefault("agents", {})
        defaults = agents.setdefault("defaults", {})
        defaults["model"] = {"primary": AGENT_MODELS["main"]}
        defaults["workspace"] = "/home/user/.openclaw/workspace"
        # Replace the model catalog to prevent stale model sprawl/token overhead.
        defaults["models"] = build_default_models(active_provider_ids)
        for key, value in TOKEN_TUNED_DEFAULTS.items():
            defaults[key] = value

        # Remove deprecated keys that newer versions reject.
        defaults.get("subagents", {}).pop("maxConcurrent", None)
        if defaults.get("subagents") == {}:
            defaults.pop("subagents", None)
        defaults.pop("thinkingDefault", None)

        agent_list = agents.setdefault("list", [])
        by_id = {
            entry.get("id"): entry
            for entry in agent_list
            if isinstance(entry, dict) and entry.get("id")
        }

        for agent_id in ("main", "ops", "research", "homelab", "n8n-control"):
            agent = by_id.get(agent_id)
            if agent is None:
                agent = {"id": agent_id}
                agent_list.append(agent)
                by_id[agent_id] = agent

            workspace_name = AGENT_WORKSPACES[agent_id]
            agent["workspace"] = f"/home/user/.openclaw/{workspace_name}"
            agent["agentDir"] = f"/home/user/.openclaw/agents/{agent_id}/agent"
            agent["model"] = AGENT_MODELS[agent_id]
            if agent_id == "homelab":
                agent["skills"] = HOMELAB_AGENT_SKILLS.copy()
            else:
                # Keep non-homelab lanes focused and low-noise.
                agent["skills"] = CORE_AGENT_SKILLS.copy()

            if agent_id != "main":
                agent.setdefault("name", agent_id)
                identity = agent.setdefault("identity", {})
                identity.setdefault("name", AGENT_IDENTITIES.get(agent_id, agent_id.capitalize()))

            if agent_id == "n8n-control":
                for key, value in N8N_CONTROL_TUNING.items():
                    agent[key] = value

            # Remove deprecated keys that newer versions reject.
            agent.get("subagents", {}).pop("maxConcurrent", None)
            if agent.get("subagents") == {}:
                agent.pop("subagents", None)
            agent.pop("thinkingDefault", None)

        CONFIG_PATH.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")


    def patch_agent_model_overrides() -> None:
        """Overwrite per-agent models.json files to eliminate stale provider overrides.

        OpenClaw merges per-agent models.json on top of the global openclaw.json
        providers config. Old GUI-created files can retain env placeholders or
        wrong base URLs that cause 401s even after the global config is correct.
        We write a clean authoritative models.json for every managed agent so that
        the in-process merge always produces the right credential references.
        """
        runtime_provider_configs = build_runtime_provider_configs()
        clean_providers = {k: v for k, v in runtime_provider_configs.items()}
        clean_models_json = json.dumps({"providers": clean_providers}, indent=2) + "\n"
        agents_root = ROOT / "agents"
        for agent_id in AGENT_WORKSPACES:
            models_path = agents_root / agent_id / "agent" / "models.json"
            if models_path.exists():
                try:
                    existing = json.loads(models_path.read_text(encoding="utf-8"))
                    existing_providers = normalize_provider_map(existing.get("providers", {}))
                    # Overwrite all provider entries we manage; leave any extra
                    # provider keys the user may have added via GUI intact.
                    for pid in PROVIDER_CONFIGS:
                        existing_providers.pop(pid, None)
                    for pid, pcfg in runtime_provider_configs.items():
                        existing_providers[pid] = pcfg
                    # Remove the legacy ollama provider (duplicate, sometimes stale keys).
                    existing_providers.pop("ollama", None)
                    existing["providers"] = existing_providers
                    models_path.write_text(json.dumps(existing, indent=2) + "\n", encoding="utf-8")
                except (json.JSONDecodeError, OSError):
                    # Corrupt file — replace entirely with clean config.
                    models_path.write_text(clean_models_json, encoding="utf-8")
            else:
                models_path.write_text(clean_models_json, encoding="utf-8")


    def build_env_secret_ref(env_name: str) -> dict:
        return {"source": "env", "provider": "default", "id": env_name}


    def patch_agent_auth_profiles() -> None:
        """Materialize bundled-provider auth profiles for every managed agent.

        Some bundled providers do not consistently resolve raw process env vars in
        every agent lane, especially when a non-main agent executes the request.
        We write SecretRef-backed api_key profiles per agent so OpenClaw resolves
        the provider auth through the supported auth store path instead of relying
        on implicit env probing.
        """
        agents_root = ROOT / "agents"
        for agent_id in AGENT_WORKSPACES:
            auth_path = agents_root / agent_id / "agent" / "auth-profiles.json"
            store = {"version": 1, "profiles": {}}

            if auth_path.exists():
                try:
                    loaded = json.loads(auth_path.read_text(encoding="utf-8"))
                    if isinstance(loaded, dict):
                        store.update(loaded)
                except (json.JSONDecodeError, OSError):
                    store = {"version": 1, "profiles": {}}

            if not isinstance(store.get("profiles"), dict):
                store["profiles"] = {}

            order = store.get("order")
            if not isinstance(order, dict):
                order = {}

            profiles = store["profiles"]

            for provider_id, env_name in BUNDLED_PROVIDER_AUTH_ENV.items():
                profile_id = f"{provider_id}:default"
                env_value = os.environ.get(env_name, "").strip()

                if env_value:
                    existing = profiles.get(profile_id, {})
                    if not isinstance(existing, dict):
                        existing = {}

                    existing["type"] = "api_key"
                    existing["provider"] = provider_id
                    existing["keyRef"] = build_env_secret_ref(env_name)
                    existing.pop("key", None)
                    profiles[profile_id] = existing

                    existing_order = [
                        entry
                        for entry in order.get(provider_id, [])
                        if isinstance(entry, str) and entry != profile_id
                    ]
                    order[provider_id] = [profile_id, *existing_order]
                else:
                    existing = profiles.get(profile_id)
                    if isinstance(existing, dict) and existing.get("provider") == provider_id:
                        profiles.pop(profile_id, None)

                    if provider_id in order:
                        provider_order = [
                            entry
                            for entry in order.get(provider_id, [])
                            if isinstance(entry, str) and entry != profile_id
                        ]
                        if provider_order:
                            order[provider_id] = provider_order
                        else:
                            order.pop(provider_id, None)

            store["version"] = 1
            store["profiles"] = profiles
            if order:
                store["order"] = order
            else:
                store.pop("order", None)

            auth_path.write_text(json.dumps(store, indent=2) + "\n", encoding="utf-8")


    def main() -> None:
        install_skills()
        ensure_agent_state()
        prune_workspace_noise()
        patch_config()
        patch_agent_model_overrides()
        patch_agent_auth_profiles()
        print("OpenClaw bootstrap complete")


    if __name__ == "__main__":
        main()
  main-AGENTS.md: |
    # AGENTS.md - Main Workspace

    This workspace is for direct conversations in Control UI.

    ## Session Startup

    Read these first:

    1. `SOUL.md`
    2. `USER.md`
    3. `memory/YYYY-MM-DD.md` for today, then yesterday if needed

    Only open `MEMORY.md` when the user asks for long-term context, personal history,
    resume/profile material, or older decisions that are not in the daily notes.

    ## Working Rules

    - Prefer action over ceremony.
    - Do not claim success without evidence.
    - Keep external side effects explicit.
    - Keep this workspace lean; archive bulky notes instead of loading them every chat.
    - For simple data fetch requests (for example listing n8n workflows), run one direct query path, retry at most once on transport/auth failure, then return results or a concrete error.
    - For SOPS-encrypted secret edits on Windows, prefer the repo helper `.\scripts\sops-edit.ps1 <path-to-secret.enc.yaml>` instead of raw `sops <file>` unless `SOPS_EDITOR` is already set.

    ## Bootstrap Hygiene

    - `BOOTSTRAP.md` should not exist after initial setup.
    - `HEARTBEAT.md` should stay absent unless periodic checks are intentionally configured.
  n8n-control-AGENTS.md: |
    # AGENTS.md - n8n Control Workspace

    This workspace is dedicated to n8n operations only.

    ## Scope

    Allowed work:

    - list workflows
    - find workflows by name/tag/content (for example GroupMe)
    - inspect workflow JSON
    - trigger manual runs
    - inspect execution status/errors
    - apply n8n workflow updates via the `n8n-editor` helper

    Out of scope in this workspace:

    - general coding tasks
    - Kubernetes troubleshooting unrelated to n8n workflow operations
    - broad research tasks

    ## Execution Rules

    - Prefer one direct helper path for list/filter queries:
        `python3 /home/user/.openclaw/skills/n8n/n8n_query_helper.py workflows --match <text> --limit 50`
    - Retry at most once on auth/transport errors.
    - Do not spawn subagents for simple read-only n8n queries.
    - If both attempts fail, stop and return a concise error containing the exact HTTP/transport failure.
    - Never claim workflow edits succeeded unless the helper returns success.

    ## Output Format

    - For list/filter: return count plus compact items (`id`, `name`, `active`, `updatedAt`).
    - For execution failures: include `executionId`, failed node name, and error message when available.
